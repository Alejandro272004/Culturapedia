<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CULTURAPEDIA PARTY - FIX DADO</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --bg: #050508; --danger: #ff4444; --yellow: #ffcc00; }
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Quicksand', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow: hidden;
        }
        #room-selector {
            position: fixed; inset: 0; z-index: 3000;
            background: var(--bg); display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .room-input {
            padding: 15px; font-size: 1.5rem; border-radius: 10px; border: 2px solid var(--accent);
            background: #111; color: white; text-align: center; font-family: 'Bungee'; margin: 20px; text-transform: uppercase;
        }
        #roulette-overlay, #lobby-overlay {
            position: fixed; inset: 0; z-index: 2000;
            display: none; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            backdrop-filter: blur(15px); background: rgba(5, 5, 8, 0.95);
        }
        .game-wrapper {
            position: relative; width: 95vw; max-width: 500px;
            aspect-ratio: 760 / 1080; background: url('Tablero (1).jpg') no-repeat center center;
            background-size: contain; margin-top: 10px;
        }
        .player-token {
            position: absolute; width: 28px; height: 28px; border-radius: 50%; border: 2px solid white;
            transition: all 0.7s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; transform: translate(-50%, -50%);
            display: flex; justify-content: center; align-items: center; font-size: 12px; font-weight: 900;
        }
        .ui-panel {
            position: fixed; bottom: 20px; right: 20px; background: rgba(20, 20, 30, 0.95);
            padding: 15px; border-radius: 15px; border: 2px solid var(--accent); width: 160px; text-align: center;
        }
        .dice-btn { background: var(--accent); color: #000; border: none; width: 100%; padding: 10px; font-family: 'Bungee'; border-radius: 8px; cursor: pointer; }
        .dice-btn:disabled { background: #444 !important; color: #888; cursor: not-allowed; }
        .reset-btn { background: none; color: var(--danger); border: 1px solid var(--danger); width: 100%; padding: 5px; font-size: 0.6rem; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        #dice-result { font-family: 'Bungee'; font-size: 2rem; color: var(--accent); margin: 5px 0; }
    </style>
</head>
<body>

    <div id="room-selector">
        <h1 style="font-family: 'Bungee'; color: var(--accent);">CULTURAPEDIA PARTY</h1>
        <input type="text" id="room-id-input" class="room-input" placeholder="NOMBRE DE LA SALA">
        <button class="dice-btn" style="width: auto; padding: 15px 40px;" onclick="joinRoom()">ENTRAR A JUGAR</button>
    </div>

    <div id="roulette-overlay">
        <h2 style="font-family: 'Bungee'; color: var(--yellow);">¡MINIJUEGO!</h2>
        <div id="game-name-display" style="font-family: 'Bungee'; font-size: 1.8rem;">SORTEANDO...</div>
    </div>

    <div id="lobby-overlay">
        <h1 style="font-family: 'Bungee'; color: var(--accent);">SALA DE ESPERA</h1>
        <p id="room-display" style="color: var(--yellow); font-weight: bold;"></p>
        <p id="player-count">Conectando...</p>
    </div>

    <div class="game-wrapper" id="board"></div>

    <div class="ui-panel">
        <div id="turn-name" style="font-weight: 800; color: var(--accent); margin-bottom: 5px;">---</div>
        <div id="dice-result">?</div>
        <button class="dice-btn" id="roll-btn" onclick="rollDice()" disabled>ESPERA</button>
        <button class="reset-btn" onclick="masterReset()">REINICIAR SALA</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get, onDisconnect } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDPcUJWbE9zUzNdgm3nqax7FFvadLixTIE",
        authDomain: "trivialbrutal.firebaseapp.com",
        databaseURL: "https://trivialbrutal-default-rtdb.firebaseio.com",
        projectId: "trivialbrutal",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let roomId = new URLSearchParams(window.location.search).get('sala');
    let myId = sessionStorage.getItem('pId') || "P-" + Math.random().toString(36).substr(2, 5);
    sessionStorage.setItem('pId', myId);

    if(roomId) {
        document.getElementById('room-selector').style.display = 'none';
        initGame();
    }

    window.joinRoom = function() {
        const input = document.getElementById('room-id-input').value.trim().toUpperCase();
        if(input) window.location.search = `?sala=${input}`;
    }

    function initGame() {
        const gameRef = ref(db, `rooms/${roomId}`);
        const myPlayerRef = ref(db, `rooms/${roomId}/players/${myId}`);
        document.getElementById('room-display').innerText = `SALA: ${roomId}`;

        // Registro de mi jugador
        set(myPlayerRef, { name: "Jugador " + myId.slice(-3), position: 0 });
        onDisconnect(myPlayerRef).remove();

        onValue(gameRef, (snap) => {
            const data = snap.val();
            if (!data || !data.players) return;

            const players = data.players;
            const pIds = Object.keys(players);
            document.getElementById('player-count').innerText = `JUGADORES: ${pIds.length}`;

            // Lobby: Inicia si hay al menos 1 (para pruebas) o forceStart
            if (pIds.length >= 2 || data.forceStart) {
                document.getElementById('lobby-overlay').style.display = 'none';
                if (!data.currentTurn) update(gameRef, { currentTurn: pIds[0], turnosEnRonda: 0 });
            } else {
                document.getElementById('lobby-overlay').style.display = 'flex';
            }

            // Si el minijuego está activo, mostramos ruleta
            if (data.minigameActive) {
                startRouletteAnimation();
            } else {
                document.getElementById('roulette-overlay').style.display = 'none';
            }

            // Control de turno
            const tId = data.currentTurn;
            document.getElementById('turn-name').innerText = players[tId] ? players[tId].name : "---";
            const btn = document.getElementById('roll-btn');
            
            if (tId === myId) {
                btn.disabled = false;
                btn.innerText = "TIRAR DADO";
            } else {
                btn.disabled = true;
                btn.innerText = "ESPERA";
            }

            renderTokens(players);
        });

        // FUNCIÓN DEL DADO CORREGIDA
        window.rollDice = async function() {
            const snap = await get(gameRef);
            const data = snap.val();
            if(!data) return;

            const players = data.players;
            const pIds = Object.keys(players);
            
            const roll = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice-result').innerText = roll;
            
            // Calculamos nueva posición
            const currentPos = players[myId].position || 0;
            const nextPos = Math.min(currentPos + roll, 47);
            
            // Calculamos siguiente turno
            const currentIndex = pIds.indexOf(myId);
            const nextTId = pIds[(currentIndex + 1) % pIds.length];
            const nuevosTurnos = (data.turnosEnRonda || 0) + 1;

            const updates = {};
            updates[`players/${myId}/position`] = nextPos;
            updates[`currentTurn`] = nextTId;
            updates[`turnosEnRonda`] = nuevosTurnos;
            
            // Si todos tiraron, activar minijuego
            if (nuevosTurnos >= pIds.length) {
                updates.minigameActive = true;
            }
            
            update(gameRef, updates);
        };
    }

    function startRouletteAnimation() {
        const overlay = document.getElementById('roulette-overlay');
        const display = document.getElementById('game-name-display');
        if(overlay.style.display === 'flex') return;
        
        overlay.style.display = 'flex';
        const juegos = ["Ahorcado", "Restauradores", "Trivial", "MemoryCard"];
        let c = 0;
        const iv = setInterval(() => { display.innerText = juegos[c++ % 4]; }, 100);
        
        setTimeout(() => {
            clearInterval(iv);
            const final = juegos[Math.floor(Math.random()*4)];
            display.innerText = "¡" + final + "!";
            setTimeout(() => { 
                window.location.href = `next.html?sala=${roomId}&game=${final}`; 
            }, 1500);
        }, 3000);
    }

    function renderTokens(players) {
        const board = document.getElementById('board');
        Object.keys(players).forEach((id, idx) => {
            let t = document.getElementById('token-' + id);
            if (!t) {
                t = document.createElement('div'); t.id = 'token-' + id; t.className = 'player-token';
                t.style.background = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33F6'][idx % 5];
                t.innerText = players[id].name.slice(-1); board.appendChild(t);
            }
            const p = players[id].position || 0;
            if (coords[p]) { t.style.left = coords[p].x + "%"; t.style.top = coords[p].y + "%"; }
        });
    }

    window.masterReset = async () => {
        if(confirm("Reiniciar sala?")) {
            await set(ref(db, `rooms/${roomId}`), null);
            location.reload();
        }
    }

    const coords = { 0: {x: 14, y: 10}, 1: {x: 10, y: 12}, 2: {x: 8, y: 20}, 3: {x: 8, y: 30}, 4: {x: 12, y: 38}, 5: {x: 21, y: 31}, 6: {x: 21, y: 23}, 7: {x: 27, y: 17}, 8: {x: 37, y: 15}, 9: {x: 46, y: 15}, 10: {x: 65, y: 15}, 11: {x: 75, y: 19}, 12: {x: 81, y: 28}, 13: {x: 78, y: 38}, 14: {x: 68, y: 38}, 15: {x: 63, y: 29}, 16: {x: 54, y: 25}, 17: {x: 43, y: 28}, 18: {x: 37, y: 35}, 19: {x: 37, y: 44}, 20: {x: 39, y: 55}, 21: {x: 49, y: 59}, 22: {x: 60, y: 59}, 23: {x: 71, y: 56}, 24: {x: 79, y: 64}, 25: {x: 72, y: 72}, 26: {x: 61, y: 72}, 27: {x: 50, y: 72}, 28: {x: 40, y: 72}, 29: {x: 31, y: 65}, 30: {x: 27, y: 53}, 31: {x: 13, y: 55}, 32: {x: 8, y: 65}, 33: {x: 8, y: 74}, 34: {x: 11, y: 84}, 35: {x: 19, y: 91}, 36: {x: 26, y: 82}, 37: {x: 34, y: 74}, 38: {x: 53, y: 82}, 39: {x: 55, y: 74}, 40: {x: 65, y: 78}, 41: {x: 66, y: 88}, 42: {x: 54, y: 94}, 43: {x: 44, y: 92}, 44: {x: 34, y: 94}, 45: {x: 40, y: 95}, 46: {x: 53, y: 98}, 47: {x: 65, y: 98} };
</script>
</body>
</html>
