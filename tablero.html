<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CULTURAPEDIA PARTY - 5 JUGADORES</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --bg: #050508; --success: #00ff88; --error: #ff3e3e; }
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Quicksand', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow: hidden;
        }

        /* CAPA DE ESPERA (LOBBY OVERLAY) */
        #lobby-overlay {
            position: fixed; inset: 0; background: rgba(5, 5, 8, 0.95);
            z-index: 1000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        .loader {
            width: 50px; height: 50px; border: 5px solid #333;
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* TABLERO */
        .game-wrapper {
            position: relative; width: 90vw; max-width: 550px;
            aspect-ratio: 760 / 1080; background: url('Tablero (1).jpg') no-repeat center center;
            background-size: contain; margin: 2vh auto;
        }

        .player-token {
            position: absolute; width: 28px; height: 28px;
            border-radius: 50%; border: 2px solid white;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100; transform: translate(-50%, -50%);
            display: flex; justify-content: center; align-items: center;
            font-size: 12px; font-weight: 800; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* UI PANEL */
        .ui-panel {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(15, 15, 22, 0.9); padding: 20px;
            border-radius: 20px; border: 2px solid var(--accent);
            width: 200px; text-align: center; backdrop-filter: blur(10px);
        }

        .dice-btn {
            background: var(--accent); color: black; border: none;
            width: 100%; padding: 12px; font-family: 'Bungee';
            font-size: 1.1rem; border-radius: 12px; cursor: pointer;
        }
        .dice-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        #dice-result { font-family: 'Bungee'; font-size: 2rem; color: var(--accent); margin: 10px 0; }
    </style>
</head>
<body>

    <div id="lobby-overlay">
        <div class="loader"></div>
        <h1 style="font-family: 'Bungee'; color: var(--accent);">ESPERANDO JUGADORES</h1>
        <p id="player-count">Cargando sala... (0 / 5)</p>
        <p style="font-size: 0.8rem; opacity: 0.6;">El juego comenzará automáticamente al llegar a 5.</p>
    </div>

    <div class="game-wrapper" id="board">
        </div>

    <div class="ui-panel">
        <div style="font-size: 0.7rem; opacity: 0.7;">TURNO DE:</div>
        <div id="current-player-display" style="font-weight: 800; color: var(--accent); margin-bottom: 10px;">---</div>
        <div id="dice-result">?</div>
        <button class="dice-btn" id="roll-btn" onclick="rollDice()" disabled>TIRAR DADO</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDPcUJWbE9zUzNdgm3nqax7FFvadLixTIE",
        authDomain: "trivialbrutal.firebaseapp.com",
        databaseURL: "https://trivialbrutal-default-rtdb.firebaseio.com",
        projectId: "trivialbrutal",
        storageBucket: "trivialbrutal.firebasestorage.app",
        messagingSenderId: "428554501222",
        appId: "1:428554501222:web:0985d7e8784cd46657c1a7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 1. GENERAR ID ÚNICO POR NAVEGADOR
    // Usamos un ID aleatorio para que aunque abras 10 pestañas, cada una sea un jugador distinto
    let myId = sessionStorage.getItem('partyPlayerId');
    if (!myId) {
        myId = "Player_" + Math.random().toString(36).substr(2, 5);
        sessionStorage.setItem('partyPlayerId', myId);
    }
    
    // El nombre visual que aparecerá
    let myName = localStorage.getItem('triviaUser') || myId;

    const gameRef = ref(db, 'mario_party_live');
    const myPlayerRef = ref(db, `mario_party_live/players/${myId}`);

    // 2. REGISTRAR PRESENCIA
    // Al entrar, nos añadimos con nuestra posición 0
    set(myPlayerRef, {
        name: myName,
        position: 0,
        colorIndex: Math.floor(Math.random() * 5),
        lastActive: serverTimestamp()
    });

    // Al cerrar la pestaña, Firebase nos borra AUTOMÁTICAMENTE
    onDisconnect(myPlayerRef).remove();

    // 3. ESCUCHAR CAMBIOS EN TIEMPO REAL
    // 3. ESCUCHAR CAMBIOS EN TIEMPO REAL
    onValue(gameRef, (snapshot) => {
        const data = snapshot.val();
        
        // Si no hay datos o jugadores, no hacemos nada
        if (!data || !data.players) {
            document.getElementById('player-count').innerText = "ESPERANDO... (0 / 5)";
            return;
        }

        const playersMap = data.players;
        const playerIds = Object.keys(playersMap);
        const count = playerIds.length;

        // Actualizar contador visual
        const countDisplay = document.getElementById('player-count');
        if (countDisplay) countDisplay.innerText = `JUGADORES EN SALA: ${count} / 5`;

        // LÓGICA DE INICIO (Mínimo 5 para jugar)
        if (count >= 5) {
            document.getElementById('lobby-overlay').style.display = 'none';
            
            // --- CORRECCIÓN AQUÍ: ASIGNAR TURNO INICIAL ---
            // Si el juego ya debería haber empezado pero no hay turno asignado...
            if (!data.currentTurn) {
                // El primer ID de la lista (el que más tiempo lleva) recibe el turno
                update(gameRef, { currentTurn: playerIds[0] });
                return; // Salimos para que el siguiente ciclo de onValue aplique el cambio
            }
            
            // Si el jugador que tenía el turno se desconectó, pasamos al siguiente
            if (!playersMap[data.currentTurn]) {
                update(gameRef, { currentTurn: playerIds[0] });
                return;
            }
        } else {
            document.getElementById('lobby-overlay').style.display = 'flex';
        }

        // PANEL DE TURNO
        const turnId = data.currentTurn;
        // Buscamos el nombre del jugador al que le toca
        const turnName = playersMap[turnId] ? playersMap[turnId].name : "Iniciando...";
        document.getElementById('player-turn-name').innerText = turnName;
        
        // ACTIVAR BOTÓN: Solo si mi ID es igual al ID del turno
        const rollBtn = document.getElementById('roll-btn');
        if (turnId === myId) {
            rollBtn.disabled = false;
            rollBtn.style.boxShadow = "0 0 20px var(--accent)"; // Efecto visual para avisar
        } else {
            rollBtn.disabled = true;
            rollBtn.style.boxShadow = "none";
        }

        // ACTUALIZAR FICHAS
        updateFichas(playersMap);
    });

    function updateFichas(players) {
        const board = document.getElementById('board');
        const colors = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33F6'];
        
        Object.keys(players).forEach((id, index) => {
            let token = document.getElementById('token-' + id);
            if (!token) {
                token = document.createElement('div');
                token.id = 'token-' + id;
                token.className = 'player-token';
                token.style.background = colors[index % colors.length];
                token.innerText = players[id].name.charAt(0).toUpperCase();
                board.appendChild(token);
            }
            
            const pos = players[id].position || 0;
            if (coords[pos]) {
                token.style.left = coords[pos].x + "%";
                token.style.top = coords[pos].y + "%";
            }
        });

        // Limpiar fichas de jugadores que se fueron
        document.querySelectorAll('.player-token').forEach(t => {
            const id = t.id.replace('token-', '');
            if (!players[id]) t.remove();
        });
    }

    // 4. TIRAR DADO
    window.rollDice = async function() {
        const roll = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-result').innerText = roll;
        
        const snap = await get(gameRef);
        const data = snap.val();
        const playerIds = Object.keys(data.players);
        
        let currentPos = data.players[myId].position || 0;
        let newPos = Math.min(currentPos + roll, 47);

        // Pasar turno al siguiente ID
        let myIdx = playerIds.indexOf(myId);
        let nextPlayerId = playerIds[(myIdx + 1) % playerIds.length];

        const updates = {};
        updates[`players/${myId}/position`] = newPos;
        updates[`currentTurn`] = nextPlayerId;
        update(gameRef, updates);
    };

    // --- COORDENADAS (las mismas de antes) ---
    const coords = { 0: {x: 14, y: 10}, 1: {x: 10, y: 12}, 2: {x: 8, y: 20}, 3: {x: 8, y: 30}, 4: {x: 12, y: 38}, 5: {x: 21, y: 31}, 6: {x: 21, y: 23}, 7: {x: 27, y: 17}, 8: {x: 37, y: 15}, 9: {x: 46, y: 15}, 10: {x: 65, y: 15}, 11: {x: 75, y: 19}, 12: {x: 81, y: 28}, 13: {x: 78, y: 38}, 14: {x: 68, y: 38}, 15: {x: 63, y: 29}, 16: {x: 54, y: 25}, 17: {x: 43, y: 28}, 18: {x: 37, y: 35}, 19: {x: 37, y: 44}, 20: {x: 39, y: 55}, 21: {x: 49, y: 59}, 22: {x: 60, y: 59}, 23: {x: 71, y: 56}, 24: {x: 79, y: 64}, 25: {x: 72, y: 72}, 26: {x: 61, y: 72}, 27: {x: 50, y: 72}, 28: {x: 40, y: 72}, 29: {x: 31, y: 65}, 30: {x: 27, y: 53}, 31: {x: 13, y: 55}, 32: {x: 8, y: 65}, 33: {x: 8, y: 74}, 34: {x: 11, y: 84}, 35: {x: 19, y: 91}, 36: {x: 26, y: 82}, 37: {x: 34, y: 74}, 38: {x: 53, y: 82}, 39: {x: 55, y: 74}, 40: {x: 65, y: 78}, 41: {x: 66, y: 88}, 42: {x: 54, y: 94}, 43: {x: 44, y: 92}, 44: {x: 34, y: 94}, 45: {x: 40, y: 100}, 46: {x: 53, y: 100}, 47: {x: 65, y: 100} };
</script>
</body>
</html>
