<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABLERO CULTURAPEDIA - MARIO PARTY</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2ff;
            --bg: #050508;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* CONTENEDOR DEL TABLERO */
        .game-container {
            position: relative;
            width: 95vh; /* Ajustado para que quepa en la pantalla verticalmente */
            max-width: 100vw;
            aspect-ratio: 2 / 3; /* Basado en la proporción de tu imagen */
            background: url('Tablero (1).jpg') no-repeat center center;
            background-size: contain;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            margin-top: 10px;
        }

        /* LAS FICHAS DE LOS JUGADORES */
        .player-token {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 3px solid white;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            text-shadow: 0 0 5px black;
        }

        /* PANEL DE CONTROL */
        .ui-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(15, 15, 22, 0.9);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid var(--accent);
            text-align: center;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .dice-btn {
            background: var(--accent);
            color: black;
            border: none;
            padding: 15px 30px;
            font-family: 'Bungee', cursive;
            font-size: 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .dice-btn:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .turn-indicator {
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: var(--accent);
        }

        #dice-result {
            font-size: 2rem;
            margin-top: 10px;
            display: block;
            font-family: 'Bungee';
        }

        /* TEXTOS DE SALIDA Y LLEGADA */
        .label {
            position: absolute;
            font-family: 'Bungee';
            background: var(--accent);
            color: black;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="game-container" id="board">
        <div class="label" style="top: 5%; left: 5%;">SALIDA</div>
        <div class="label" style="bottom: 5%; right: 5%;">LLEGADA</div>
        
        </div>

    <div class="ui-panel">
        <div class="turn-indicator" id="turn-text">Esperando turno...</div>
        <button class="dice-btn" id="roll-btn" onclick="rollDice()">TIRAR DADO 🎲</button>
        <span id="dice-result">?</span>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDPcUJWbE9zUzNdgm3nqax7FFvadLixTIE",
        authDomain: "trivialbrutal.firebaseapp.com",
        databaseURL: "https://trivialbrutal-default-rtdb.firebaseio.com",
        projectId: "trivialbrutal",
        storageBucket: "trivialbrutal.firebasestorage.app",
        messagingSenderId: "428554501222",
        appId: "1:428554501222:web:0985d7e8784cd46657c1a7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const myName = localStorage.getItem('triviaUser') || "Invitado";

    // --- COORDENADAS APROXIMADAS DEL TABLERO (%) ---
    // Deberás ajustar estos números para que coincidan exactamente con tus casillas
    const coords = {
        0: {x: 8, y: 8},   // Salida
        1: {x: 12, y: 12}, // Casilla 1
        2: {x: 12, y: 18},
        3: {x: 12, y: 25},
        // ... (Aquí irían las 47 coordenadas)
        47: {x: 70, y: 92} // Llegada
    };

    // Función para autogenerar coordenadas de prueba (Zig-Zag)
    for(let i=4; i<=46; i++) {
        coords[i] = { x: 20 + (Math.sin(i/2)*30), y: 10 + (i*1.8) };
    }

    const gameRef = ref(db, 'mario_party_game');
    const colors = ['#ff3e3e', '#00ff88', '#00f2ff', '#ffcc00', '#ff00ff'];

    // Escuchar estado del juego
    onValue(gameRef, (snapshot) => {
        const data = snapshot.val();
        if(!data) return;

        updateBoard(data.players);
        checkTurn(data.currentTurn);
    });

    function updateBoard(players) {
        if(!players) return;
        Object.keys(players).forEach((pName, index) => {
            let el = document.getElementById(`token-${pName}`);
            if(!el) {
                el = document.createElement('div');
                el.id = `token-${pName}`;
                el.className = 'player-token';
                el.style.backgroundColor = colors[index];
                el.innerText = pName.charAt(0);
                document.getElementById('board').appendChild(el);
            }
            
            const pos = players[pName].position || 0;
            const targetCoord = coords[pos] || coords[0];
            el.style.left = targetCoord.x + "%";
            el.style.top = targetCoord.y + "%";
        });
    }

    function checkTurn(currentTurn) {
        const btn = document.getElementById('roll-btn');
        const turnText = document.getElementById('turn-text');
        
        if(currentTurn === myName) {
            btn.disabled = false;
            turnText.innerText = "¡ES TU TURNO!";
            turnText.style.color = "var(--success)";
        } else {
            btn.disabled = true;
            turnText.innerText = `Turno de: ${currentTurn}`;
            turnText.style.color = "white";
        }
    }

    window.rollDice = function() {
        const roll = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-result').innerText = roll;
        document.getElementById('roll-btn').disabled = true;

        // Obtener posición actual y actualizar
        onValue(ref(db, `mario_party_game/players/${myName}`), (snap) => {
            const currentPos = snap.val()?.position || 0;
            const newPos = Math.min(currentPos + roll, 47);
            
            // Actualizar en Firebase
            const updates = {};
            updates[`players/${myName}/position`] = newPos;
            
            // Lógica de turnos (pasar al siguiente jugador de los 5)
            // Aquí simplificado:
            update(gameRef, updates);
        }, { onlyOnce: true });
    };

</script>
</body>
</html>
