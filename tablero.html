<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CULTURAPEDIA PARTY - MULTIPLAYER REAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --bg: #050508; --success: #00ff88; --error: #ff3e3e; }
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Quicksand', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow: hidden;
        }

        /* OVERLAY DE MINIJUEGO */
        #minigame-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9);
            z-index: 2000; display: none; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        #lobby-overlay {
            position: fixed; inset: 0; background: rgba(5, 5, 8, 0.95);
            z-index: 1000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        .loader {
            width: 50px; height: 50px; border: 5px solid #333;
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .game-wrapper {
            position: relative; width: 90vw; max-width: 550px;
            aspect-ratio: 760 / 1080; background: url('Tablero (1).jpg') no-repeat center center;
            background-size: contain; margin: 2vh auto;
        }

        .player-token {
            position: absolute; width: 32px; height: 32px;
            border-radius: 50%; border: 2px solid white;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100; transform: translate(-50%, -50%);
            display: flex; justify-content: center; align-items: center;
            font-size: 14px; font-weight: 800; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .ui-panel {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(15, 15, 22, 0.9); padding: 20px;
            border-radius: 20px; border: 2px solid var(--accent);
            width: 200px; text-align: center; backdrop-filter: blur(10px);
        }

        .dice-btn {
            background: var(--accent); color: black; border: none;
            width: 100%; padding: 12px; font-family: 'Bungee';
            font-size: 1.1rem; border-radius: 12px; cursor: pointer;
        }
        .dice-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        #dice-result { font-family: 'Bungee'; font-size: 2rem; color: var(--accent); margin: 10px 0; }
    </style>
</head>
<body>

    <div id="minigame-overlay">
        <h1 style="font-family: 'Bungee'; color: #ffcc00; font-size: 3rem;">¡MINIJUEGO!</h1>
        <p id="minigame-text" style="font-size: 1.5rem;">Preparando reto cultural...</p>
        <button class="dice-btn" onclick="cerrarMinijuego()" style="width: auto; margin-top: 20px;">CONTINUAR</button>
    </div>

    <div id="lobby-overlay">
        <div class="loader"></div>
        <h1 style="font-family: 'Bungee'; color: var(--accent);">ESPERANDO JUGADORES</h1>
        <p id="player-count">Conectando... (0 / 5)</p>
    </div>

    <div class="game-wrapper" id="board"></div>

    <div class="ui-panel">
        <div style="font-size: 0.7rem; opacity: 0.7;">TURNO DE:</div>
        <div id="current-player-display" style="font-weight: 800; color: var(--accent); margin-bottom: 10px;">---</div>
        <div id="dice-result">?</div>
        <button class="dice-btn" id="roll-btn" onclick="rollDice()" disabled>TIRAR DADO</button>
    </div>

<script type="module">
    // ... (Mantén tus imports y config de Firebase igual que arriba)

    // --- LÓGICA DEL CÓDIGO SECRETO ---
    const secretCode = [
        'ArrowUp', 'ArrowUp', 
        'ArrowDown', 'ArrowDown', 
        'ArrowLeft', 'ArrowRight', 
        ' ' // Espacio
    ];
    let inputIndex = 0;

    window.addEventListener('keydown', (e) => {
        // Comprobar si la tecla coincide con la secuencia
        if (e.key === secretCode[inputIndex]) {
            inputIndex++;
            // Si se completa el código
            if (inputIndex === secretCode.length) {
                activarJuegoForzado();
                inputIndex = 0;
            }
        } else {
            inputIndex = 0; // Reiniciar si falla una tecla
        }
    });

    async function activarJuegoForzado() {
        console.log("⚠️ CÓDIGO SECRETO ACTIVADO: Forzando inicio...");
        const snap = await get(gameRef);
        const data = snap.val();
        if (data && data.players) {
            const playerIds = Object.keys(data.players);
            // Actualizamos Firebase para que TODOS vean el juego iniciado
            update(gameRef, { 
                forceStart: true, 
                currentTurn: data.currentTurn || playerIds[0],
                turnosEnRonda: 0 
            });
            alert("¡MODO DESARROLLADOR ACTIVADO! Iniciando partida...");
        }
    }

    // --- MODIFICACIÓN EN EL ONVALUE ---
    onValue(gameRef, (snapshot) => {
        const data = snapshot.val();
        if (!data || !data.players) return;

        const playerIds = Object.keys(data.players);
        const count = playerIds.length;

        document.getElementById('player-count').innerText = `JUGADORES EN SALA: ${count} / 5`;

        // REGLA DE INICIO: Se inicia si hay 5 O si forceStart es true
        if (count >= 5 || data.forceStart === true) {
            document.getElementById('lobby-overlay').style.display = 'none';
            
            if (!data.currentTurn) {
                update(gameRef, { currentTurn: playerIds[0], turnosEnRonda: 0 });
            }
        } else {
            document.getElementById('lobby-overlay').style.display = 'flex';
        }

        // ... (El resto de tu lógica de turnos, fichas y minijuegos igual)
        
        // Lógica de Minijuego (Solo si el juego NO está forzado o si quieres mantenerlo)
        if (data.turnosEnRonda >= count && count > 0) { 
             // Ajustado para que la ronda termine según el número REAL de jugadores conectados
             mostrarMinijuego();
        }
    });

    // ... (El resto del código de tirar dado y coordenadas)
</script>
</body>
</html>
