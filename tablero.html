<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CULTURAPEDIA PARTY - 5 JUGADORES</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --bg: #050508; --success: #00ff88; --error: #ff3e3e; }
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Quicksand', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow: hidden;
        }

        /* CAPA DE ESPERA (LOBBY OVERLAY) */
        #lobby-overlay {
            position: fixed; inset: 0; background: rgba(5, 5, 8, 0.95);
            z-index: 1000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        .loader {
            width: 50px; height: 50px; border: 5px solid #333;
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* TABLERO */
        .game-wrapper {
            position: relative; width: 90vw; max-width: 550px;
            aspect-ratio: 760 / 1080; background: url('Tablero (1).jpg') no-repeat center center;
            background-size: contain; margin: 2vh auto;
        }

        .player-token {
            position: absolute; width: 28px; height: 28px;
            border-radius: 50%; border: 2px solid white;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100; transform: translate(-50%, -50%);
            display: flex; justify-content: center; align-items: center;
            font-size: 12px; font-weight: 800; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* UI PANEL */
        .ui-panel {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(15, 15, 22, 0.9); padding: 20px;
            border-radius: 20px; border: 2px solid var(--accent);
            width: 200px; text-align: center; backdrop-filter: blur(10px);
        }

        .dice-btn {
            background: var(--accent); color: black; border: none;
            width: 100%; padding: 12px; font-family: 'Bungee';
            font-size: 1.1rem; border-radius: 12px; cursor: pointer;
        }
        .dice-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        #dice-result { font-family: 'Bungee'; font-size: 2rem; color: var(--accent); margin: 10px 0; }
    </style>
</head>
<body>

    <div id="lobby-overlay">
        <div class="loader"></div>
        <h1 style="font-family: 'Bungee'; color: var(--accent);">ESPERANDO JUGADORES</h1>
        <p id="player-count">Cargando sala... (0 / 5)</p>
        <p style="font-size: 0.8rem; opacity: 0.6;">El juego comenzará automáticamente al llegar a 5.</p>
    </div>

    <div class="game-wrapper" id="board">
        </div>

    <div class="ui-panel">
        <div style="font-size: 0.7rem; opacity: 0.7;">TURNO DE:</div>
        <div id="current-player-display" style="font-weight: 800; color: var(--accent); margin-bottom: 10px;">---</div>
        <div id="dice-result">?</div>
        <button class="dice-btn" id="roll-btn" onclick="rollDice()" disabled>TIRAR DADO</button>
    </div>

<script type="module">
    // ... (imports y config igual)

    const db = getDatabase(app);
    // IMPORTANTE: Si no hay nombre en el navegador, generamos uno temporal
    let myName = localStorage.getItem('triviaUser');
    if (!myName) {
        myName = "Invitado_" + Math.floor(Math.random() * 1000);
        localStorage.setItem('triviaUser', myName);
    }

    const gameRef = ref(db, 'mario_party_live');
    const colors = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33F6'];

    // 1. REGISTRARSE AL ENTRAR (Aseguramos que existas en la DB)
    const myPlayerRef = ref(db, `mario_party_live/players/${myName}`);
    set(myPlayerRef, { 
        position: 0, 
        lastActive: serverTimestamp() 
    });

    // Al cerrar el navegador, te borras de la lista
    onDisconnect(myPlayerRef).remove();

    // 2. ESCUCHAR ESTADO GLOBAL
    onValue(gameRef, (snapshot) => {
        const data = snapshot.val();
        if(!data || !data.players) {
            // Si la sala está vacía, la inicializamos
            return; 
        }

        const playerNames = Object.keys(data.players);
        const count = playerNames.length;

        // Mostrar contador en el overlay
        const countDisplay = document.getElementById('player-count');
        if(countDisplay) countDisplay.innerText = `JUGADORES EN SALA: ${count} / 5`;

        // SI HAY 5 PERSONAS, QUITAMOS EL BLOQUEO
        if(count >= 5) {
            document.getElementById('lobby-overlay').style.display = 'none';
            
            // Si no hay nadie al mando, el primero de la lista toma el turno
            if(!data.currentTurn) {
                update(gameRef, { currentTurn: playerNames[0] });
            }
        } else {
            document.getElementById('lobby-overlay').style.display = 'flex';
        }

        // LÓGICA DE TURNOS
        const turnOf = data.currentTurn;
        document.getElementById('current-player-display').innerText = turnOf || "Esperando...";
        
        // El botón solo se activa si es exactamente TU NOMBRE
        const rollBtn = document.getElementById('roll-btn');
        rollBtn.disabled = (turnOf !== myName);

        // DIBUJAR FICHAS (Limpiamos y redibujamos para evitar duplicados)
        playerNames.forEach((p, idx) => {
            let token = document.getElementById('token-' + p);
            if(!token) {
                token = document.createElement('div');
                token.id = 'token-' + p;
                token.className = 'player-token';
                token.style.background = colors[idx % colors.length];
                token.innerText = p.charAt(0).toUpperCase();
                document.getElementById('board').appendChild(token);
            }
            const pos = data.players[p].position || 0;
            if(coords[pos]) {
                token.style.left = coords[pos].x + "%";
                token.style.top = coords[pos].y + "%";
            }
        });
    });

    // 3. FUNCIÓN DE TIRAR DADO
    window.rollDice = async function() {
        const roll = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-result').innerText = roll;
        
        const snap = await get(gameRef);
        const data = snap.val();
        const players = Object.keys(data.players);
        
        let currentPos = data.players[myName].position || 0;
        let newPos = Math.min(currentPos + roll, 47);

        // Calcular siguiente turno
        let myIdx = players.indexOf(myName);
        let nextPlayer = players[(myIdx + 1) % players.length];

        // Actualizar Firebase
        const updates = {};
        updates[`players/${myName}/position`] = newPos;
        updates[`currentTurn`] = nextPlayer;
        update(gameRef, updates);
    };
</script>
</body>
</html>
