<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIVIAL BRUTAL - DELUXE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* TEMA DINÁMICO */
        [data-theme="dark"] {
            --bg: #050508; --container-bg: #0f0f16; --card-inner: #161622;
            --text: #ffffff; --text-dim: #a0a0b8; --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3); --border: #222230;
        }
        [data-theme="light"] {
            --bg: #f0f2f5; --container-bg: #ffffff; --card-inner: #f8f9fa;
            --text: #1a1a2e; --text-dim: #64748b; --accent: #0070f3;
            --accent-glow: rgba(0, 112, 243, 0.2); --border: #e2e8f0;
        }
        :root { --success: #00ff88; --error: #ff3e3e; --transition: all 0.3s ease; }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh;
            transition: var(--transition);
        }

        .theme-toggle {
            position: fixed; top: 20px; right: 20px; background: var(--container-bg);
            border: 1px solid var(--border); padding: 10px; border-radius: 50%; cursor: pointer;
            z-index: 100; font-size: 1.2rem;
        }

        .main-layout { display: flex; gap: 40px; width: 100%; max-width: 1100px; align-items: flex-start; }

        /* RANKING ACTUALIZADO */
        .sidebar-ranking { width: 320px; flex-shrink: 0; position: sticky; top: 20px; }
        .leaderboard { background: var(--container-bg); border-radius: 24px; padding: 24px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .leaderboard h3 { color: var(--accent); font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        
        .entry { display: flex; justify-content: space-between; padding: 12px; background: var(--card-inner); border-radius: 12px; margin-bottom: 8px; font-size: 0.85rem; align-items: center; }
        .entry-info { display: flex; flex-direction: column; gap: 2px; }
        .entry-time { font-size: 0.7rem; color: var(--text-dim); }
        .score-tag { color: var(--accent); font-weight: 800; }

        /* JUEGO */
        .container { flex-grow: 1; max-width: 500px; background: var(--container-bg); border-radius: 24px; padding: 40px; border: 1px solid var(--border); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* NUEVO: ESTILO PARA IMÁGENES */
        .q-img { width: 100%; max-height: 200px; object-fit: contain; border-radius: 12px; margin-bottom: 15px; display: none; }
        .q-img.active { display: block; }

        .btn-main { width: 100%; padding: 18px; background: var(--accent); color: #000; font-weight: 800; border: none; border-radius: 12px; cursor: pointer; text-transform: uppercase; margin-top: 20px; transition: var(--transition); }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--accent-glow); }
        .btn-main:disabled { background: var(--border) !important; color: var(--text-dim) !important; cursor: not-allowed; }

        .opt-btn { width: 100%; padding: 16px; margin-bottom: 10px; background: var(--card-inner); color: var(--text); text-align: left; border-radius: 12px; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .opt-btn:hover { border-color: var(--accent); background: var(--border); }
        .correct { background: var(--success) !important; color: #000 !important; font-weight: 800; }
        .wrong { background: var(--error) !important; color: #fff !important; }

        input { width: 100%; padding: 15px; background: var(--card-inner); border: 2px solid var(--border); color: var(--text); border-radius: 10px; margin-top: 10px; text-align: center; box-sizing: border-box; }
        .streak-fire { color: #ff8800; font-weight: 800; margin-bottom: 15px; display: inline-block; padding: 5px 15px; background: rgba(255,136,0,0.1); border-radius: 20px; }

        @media (max-width: 850px) { .main-layout { flex-direction: column; align-items: center; } .sidebar-ranking { width: 100%; order: 2; } }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">🌓</button>

<div class="main-layout">
    <aside class="sidebar-ranking">
        <div class="leaderboard">
            <h3>🏆 TOP HOY</h3>
            <div id="lead-list">Cargando...</div>
        </div>
    </aside>

    <main class="container">
        <div id="screen-auth" class="screen">
            <h1>CULTURA BRUTAL</h1>
            <p style="color: var(--text-dim);">Introduce tu nombre para el ranking</p>
            <input type="text" id="username-input" placeholder="Tu apodo">
            <button class="btn-main" id="btn-save-name">ENTRAR</button>
        </div>

        <div id="screen-home" class="screen">
            <div class="streak-fire">🔥 RACHA: <span id="streak-num">0</span> DÍAS</div>
            <h1 id="welcome-msg"></h1>
            <button id="play-today-btn" class="btn-main">JUGAR RETO DE HOY</button>
        </div>

        <div id="screen-game" class="screen">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <span id="q-count">1/10</span>
                <span id="timer" style="color: var(--accent); font-weight: 800;">00:00</span>
            </div>
            <img id="q-img" class="q-img" src="" alt="pregunta">
            <h3 id="q-text"></h3>
            <div id="options-box"></div>
        </div>

        <div id="screen-result" class="screen">
            <h2>¡FINALIZADO!</h2>
            <div id="final-stats" style="font-size: 4rem; font-weight: 900; color: var(--accent);">0/10</div>
            <p id="final-time"></p>
            <button class="btn-main" onclick="location.reload()">VOLVER</button>
        </div>
    </main>
</div>

<script>
    function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, query, orderByChild, equalTo, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDPcUJWbE9zUzNdgm3nqax7FFvadLixTIE",
        authDomain: "trivialbrutal.firebaseapp.com",
        databaseURL: "https://trivialbrutal-default-rtdb.firebaseio.com",
        projectId: "trivialbrutal",
        storageBucket: "trivialbrutal.firebasestorage.app",
        messagingSenderId: "428554501222",
        appId: "1:428554501222:web:0985d7e8784cd46657c1a7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const hoy = new Date().toISOString().split("T")[0];
    let timerInterval, currentQuestions = [], currentStep = 0, score = 0;

    const masterBank = [
        // EJEMPLO CON IMAGEN
        { q: "¿A qué país pertenece esta bandera única?", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Flag_of_Nepal.svg/800px-Flag_of_Nepal.svg.png", o: ["India", "Tíbet", "Nepal", "Bután"], a: "Nepal" },
        { q: "¿Qué país regaló la Estatua de la Libertad a EEUU?", o: ["España", "Francia", "Reino Unido", "Alemania"], a: "Francia" },
        { q: "¿Cuál es el río más caudaloso del mundo?", o: ["Nilo", "Misisipi", "Amazonas", "Danubio"], a: "Amazonas" },
        { q: "¿Qué elemento químico tiene el símbolo 'Fe'?", o: ["Flúor", "Fósforo", "Hierro", "Fermio"], a: "Hierro" },
        { q: "¿Quién fue el autor de 'La Odisea'?", o: ["Sófocles", "Homero", "Platón", "Aristóteles"], a: "Homero" },
        { q: "¿En qué país se originaron los Juegos Olímpicos?", o: ["Italia", "Grecia", "Egipto", "China"], a: "Grecia" },
        { q: "¿Cuál es el planeta más caliente del sistema solar?", o: ["Mercurio", "Marte", "Venus", "Júpiter"], a: "Venus" },
        { q: "¿Qué órgano humano consume más energía?", o: ["Corazón", "Cerebro", "Hígado", "Músculos"], a: "Cerebro" },
        { q: "¿Cuál es el idioma más hablado del mundo?", o: ["Español", "Inglés", "Chino Mandarín", "Hindi"], a: "Chino Mandarín" },
        { q: "¿Quién pintó la 'Mona Lisa'?", o: ["Miguel Ángel", "Rafael", "Leonardo da Vinci", "Donatello"], a: "Leonardo da Vinci" },
        { q: "¿Qué ciudad es conocida como 'La Gran Manzana'?", o: ["Chicago", "Londres", "Nueva York", "Tokio"], a: "Nueva York" },
        { q: "¿Cuál es la capital de Alemania?", o: ["Múnich", "Hamburgo", "Berlín", "Frankfurt"], a: "Berlín" },
        { q: "¿En qué país nació Cristóbal Colón?", o: ["España", "Portugal", "Italia", "Francia"], a: "Italia" },
        { q: "¿Qué animal es el principal transmisor de la malaria?", o: ["Rata", "Mosquito", "Murciélago", "Pulga"], a: "Mosquito" },
        { q: "¿Cuál es el metal más abundante en la corteza terrestre?", o: ["Hierro", "Cobre", "Aluminio", "Magnesio"], a: "Aluminio" },
        { q: "¿Qué ciudad fue destruida por el Vesubio en el 79 d.C.?", o: ["Roma", "Pompeya", "Cartago", "Atenas"], a: "Pompeya" },
        { q: "¿Cuál es la capital de Portugal?", o: ["Oporto", "Lisboa", "Coimbra", "Faro"], a: "Lisboa" },
        { q: "¿Quién escribió 'Cien años de soledad'?", o: ["Vargas Llosa", "Neruda", "García Márquez", "Borges"], a: "García Márquez" },
        { q: "¿Cuántos colores tiene el arcoíris?", o: ["5", "6", "7", "8"], a: "7" },
        { q: "¿Cuál es el mamífero más rápido del mar?", o: ["Tiburón", "Orca", "Delfín", "Marsopa"], a: "Orca" },
        { q: "¿En qué año cayó el muro de Berlín?", o: ["1985", "1989", "1991", "1993"], a: "1989" },
        { q: "¿Cuál es la capital de Canadá?", o: ["Toronto", "Montreal", "Ottawa", "Vancouver"], a: "Ottawa" },
        { q: "¿Qué filósofo dijo 'Solo sé que no sé nada'?", o: ["Platón", "Sócrates", "Aristóteles", "Descartes"], a: "Sócrates" },
        { q: "¿Cuál es el desierto más grande del mundo?", o: ["Sahara", "Gobi", "Atacama", "Antártida"], a: "Antártida" },
    ];
    
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function loadRanking() {
        const rRef = query(ref(db, 'ranking'), orderByChild('date'), equalTo(hoy));
        onValue(rRef, (snap) => {
            let list = [];
            snap.forEach(c => list.push(c.val()));
            list.sort((a,b) => (b.points - a.points) || a.time.localeCompare(b.time));
            let html = "";
            list.slice(0,10).forEach((d, i) => {
                html += `
                <div class="entry">
                    <div class="entry-info">
                        <span>#${i+1} ${d.user}</span>
                        <span class="entry-time">⏱️ ${d.time}</span>
                    </div>
                    <span class="score-tag">${d.points}/10</span>
                </div>`;
            });
            document.getElementById('lead-list').innerHTML = html || "Sin datos hoy";
        });
    }

    function checkAuth() {
        const name = localStorage.getItem('triviaUser');
        if (!name) showScreen('screen-auth');
        else {
            showScreen('screen-home');
            document.getElementById('welcome-msg').innerText = `Hola, ${name}`;
            
            const lastDate = localStorage.getItem('lastDatePlayed');
            let streak = parseInt(localStorage.getItem('userStreak') || 0);
            
            if (lastDate) {
                const diffTime = Math.abs(new Date(hoy) - new Date(lastDate));
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                if (diffDays > 1) { 
                    streak = 0;
                    localStorage.setItem('userStreak', 0);
                }
            }
            
            document.getElementById('streak-num').innerText = streak;
            if(localStorage.getItem('lastPlayed_' + hoy)) {
                document.getElementById('play-today-btn').disabled = true;
                document.getElementById('play-today-btn').innerText = "VUELVE MAÑANA";
            }
            loadRanking();
        }
    }

    document.getElementById('btn-save-name').onclick = () => {
        const val = document.getElementById('username-input').value.trim();
        if(val.length >= 2) { localStorage.setItem('triviaUser', val); checkAuth(); }
    };

    document.getElementById('play-today-btn').onclick = () => {
        currentQuestions = [...masterBank].sort(() => Math.random() - 0.5);
        showScreen('screen-game');
        startTimer();
        loadQuestion();
    };

    function startTimer() {
        let start = Date.now();
        timerInterval = setInterval(() => {
            let diff = Date.now() - start;
            let m = Math.floor(diff/60000).toString().padStart(2,'0');
            let s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }, 1000);
    }

    function loadQuestion() {
        const qData = currentQuestions[currentStep];
        const imgEl = document.getElementById('q-img');
        
        document.getElementById('q-count').innerText = `${currentStep+1}/10`;
        document.getElementById('q-text').innerText = qData.q;
        
        // Muestra imagen si existe, si no la oculta
        if(qData.img) {
            imgEl.src = qData.img;
            imgEl.classList.add('active');
        } else {
            imgEl.classList.remove('active');
        }

        const box = document.getElementById('options-box');
        box.innerHTML = "";
        qData.o.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'opt-btn'; b.innerText = opt;
            b.onclick = () => {
                if(document.querySelector('.correct')) return;
                if(opt === qData.a) { b.classList.add('correct'); score++; }
                else b.classList.add('wrong');
                setTimeout(() => {
                    currentStep++;
                    if(currentStep < 10) loadQuestion(); else finish();
                }, 800);
            };
            box.appendChild(b);
        });
    }

    function finish() {
        clearInterval(timerInterval);
        const t = document.getElementById('timer').innerText;
        showScreen('screen-result');
        document.getElementById('final-stats').innerText = `${score}/10`;
        document.getElementById('final-time').innerText = `Tiempo: ${t}`;
        const name = localStorage.getItem('triviaUser');
        
        set(ref(db, `ranking/${hoy}_${name.toLowerCase().replace(/\s/g, '_')}`), {
            user: name, points: score, time: t, date: hoy, ts: serverTimestamp()
        }).then(() => {
            const lastDate = localStorage.getItem('lastDatePlayed');
            if (lastDate !== hoy) {
                let streak = parseInt(localStorage.getItem('userStreak') || 0);
                streak++;
                localStorage.setItem('userStreak', streak);
                localStorage.setItem('lastDatePlayed', hoy);
            }
            localStorage.setItem('lastPlayed_' + hoy, 'true');
        });
    }

    checkAuth();
</script>
</body>
</html>
