<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIVIAL BRUTAL DIARIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #08080a;
            --card: #12121a;
            --accent: #00f2ff;
            --success: #00ff88;
            --error: #ff3e3e;
            --gold: #ffcc00;
            --text: #ffffff;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center; /* Centra el conjunto en la pantalla */
            align-items: center;
            min-height: 100vh;
        }

        /* ESTE ES EL CAMBIO CLAVE: EL ENVOLTORIO */
        .main-layout {
            display: flex;
            flex-direction: row; /* Ranking a la izquierda, Juego a la derecha */
            align-items: flex-start;
            gap: 40px;
            width: 100%;
            max-width: 1000px; /* Ajusta según prefieras */
        }

        /* COLUMNA DEL RANKING */
        .sidebar-ranking {
            width: 320px;
            flex-shrink: 0;
        }

        /* COLUMNA DEL JUEGO */
        .game-column {
            flex-grow: 1;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        /* DISEÑO DEL RANKING (A LA IZQUIERDA) */
        .leaderboard { 
            background: rgba(255,255,255,0.03); 
            border-radius: 20px; 
            padding: 20px; 
            border: 1px solid #222;
        }
        .leaderboard h3 { 
            color: var(--accent); 
            text-transform: uppercase; 
            font-size: 0.8rem; 
            margin: 0 0 15px 0; 
            text-align: left;
            letter-spacing: 1px;
        }
        
        .entry { 
            display: flex; 
            justify-content: flex-start; 
            padding: 10px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            align-items: center;
            font-size: 0.9rem;
        }
        .rank { color: var(--gold); font-weight: 900; width: 30px; text-align: left; }
        .username { flex-grow: 1; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .score-tag { font-family: monospace; opacity: 0.8; font-size: 0.8rem; margin-left: 10px; }

        /* ESTADOS DE PANTALLA */
        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-main {
            width: 100%; padding: 18px; background: var(--accent); color: black;
            font-weight: 900; border: none; border-radius: 12px; margin-top: 20px;
            cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .btn-main:disabled { background: #333 !important; color: #666 !important; }

        input {
            width: 100%; padding: 14px; background: #1e1e2a; border: 1px solid #333;
            color: white; border-radius: 10px; margin-top: 10px; box-sizing: border-box; text-align: center;
        }

        .opt-btn {
            width: 100%; padding: 16px; margin-bottom: 12px; background: #1c1c26;
            color: white; text-align: left; border-radius: 12px; border: 2px solid transparent; cursor: pointer;
        }
        .correct { background: var(--success) !important; color: black; font-weight: bold; }
        .wrong { background: var(--error) !important; }

        .streak-fire { color: #ff8800; font-weight: 900; font-size: 1.1rem; margin-bottom: 10px; }

        /* MÓVIL: Se pone uno debajo de otro */
        @media (max-width: 800px) {
            .main-layout { flex-direction: column; align-items: center; }
            .sidebar-ranking { width: 100%; max-width: 420px; order: 2; }
        }
    </style>
</head>
<body>

<div class="main-layout">
    <aside class="sidebar-ranking">
        <div class="leaderboard">
            <h3>Ranking Mundial (Hoy)</h3>
            <div id="lead-list">Cargando...</div>
        </div>
    </aside>

    <main class="game-column">
        <div class="container">
            <div id="screen-auth" class="screen">
                <h1>Tu Apodo</h1>
                <input type="text" id="username-input" placeholder="Ej: SuperPlayer">
                <button class="btn-main" onclick="saveName()">ENTRAR</button>
            </div>

            <div id="screen-home" class="screen">
                <div class="streak-fire">🔥 RACHA: <span id="streak-num">0</span> DÍAS</div>
                <h1>Trivial Brutal</h1>
                <p id="welcome-msg" style="opacity: 0.6; font-size: 0.9rem;"></p>
                <button id="play-today-btn" class="btn-main" onclick="initGame('today')">JUGAR HOY</button>
                <div style="margin-top: 25px;">
                    <label style="font-size: 0.7rem; opacity: 0.4;">REPASAR DÍAS PREVIOS:</label>
                    <input type="date" id="calendar-input" onchange="initGame('calendar')">
                </div>
            </div>

            <div id="screen-game" class="screen">
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px; opacity: 0.6; font-size: 0.8rem;">
                    <span id="q-count">1/10</span>
                    <span id="timer">00:00</span>
                </div>
                <h2 id="q-text" style="font-size: 1.2rem;">---</h2>
                <div id="options-box"></div>
            </div>

            <div id="screen-result" class="screen">
                <h2>FIN DEL JUEGO</h2>
                <div id="final-stats" style="font-size: 3.5rem; color: var(--accent); font-weight: 900;">0/10</div>
                <p id="final-time" style="opacity: 0.6;"></p>
                <button class="btn-main" onclick="location.reload()">VOLVER</button>
            </div>
        </div>
    </main>
</div>

<script>
    // REEMPLAZA CON TUS DATOS DE FIREBASE
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_ID.firebaseapp.com",
        databaseURL: "https://TU_ID-default-rtdb.firebaseio.com",
        projectId: "TU_ID",
        storageBucket: "TU_ID.appspot.com",
        messagingSenderId: "TU_SENDER",
        appId: "TU_APP"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // BANCO DE PREGUNTAS (Muestreo de 10)
    const masterBank = [
        { q: "¿Qué gas constituye el 78% de la atmósfera?", o: ["Oxígeno", "Nitrógeno", "Argón", "CO2"], a: 1 },
        { q: "¿En qué año se hundió el Titanic?", o: ["1912", "1905", "1915", "1920"], a: 0 },
        { q: "¿Cuál es el lugar más profundo de la Tierra?", o: ["Fosa de las Marianas", "Abismo de Java", "Fosa de Puerto Rico", "Tonga"], a: 0 },
        { q: "¿Quién escribió 'Cien años de soledad'?", o: ["Vargas Llosa", "García Márquez", "Cortázar", "Borges"], a: 1 },
        { q: "¿Qué planeta tiene más lunas?", o: ["Júpiter", "Saturno", "Marte", "Urano"], a: 1 },
        { q: "¿Cuál es el hueso más largo del cuerpo?", o: ["Húmero", "Fémur", "Tibia", "Peroné"], a: 1 },
        { q: "¿Qué país regaló la Estatua de la Libertad a EE.UU.?", o: ["España", "Francia", "Reino Unido", "Italia"], a: 1 },
        { q: "¿Cuál es la capital de Australia?", o: ["Sídney", "Canberra", "Melbourne", "Perth"], a: 1 },
        { q: "¿Quién pintó el techo de la Capilla Sixtina?", o: ["Leonardo", "Miguel Ángel", "Rafael", "Donatello"], a: 1 },
        { q: "¿Cuál es el río más largo del mundo?", o: ["Nilo", "Amazonas", "Yangtsé", "Misisipi"], a: 1 }
        // ... añadir aquí las 60 preguntas para tener variedad
    ];

    const hoy = new Date().toISOString().split("T")[0];
    let timerInterval, currentQuestions = [], currentStep = 0, score = 0, playingDate = "";

    function checkAuth() {
        const name = localStorage.getItem('triviaUser');
        if (!name) showScreen('screen-auth');
        else {
            showScreen('screen-home');
            document.getElementById('welcome-msg').innerText = `Listo para el reto, ${name}`;
            document.getElementById('calendar-input').max = hoy;
            checkStreakLogic(); 
            renderLeaderboard();
            if(localStorage.getItem('lastPlayed_' + hoy)) {
                const b = document.getElementById('play-today-btn');
                b.disabled = true; b.innerText = "YA COMPLETADO";
            }
        }
    }

    function saveName() {
        const val = document.getElementById('username-input').value.trim();
        if (val.length >= 3) { localStorage.setItem('triviaUser', val); checkAuth(); }
    }

    function checkStreakLogic() {
        const lastDate = localStorage.getItem('lastDatePlayed');
        let streak = parseInt(localStorage.getItem('userStreak') || 0);

        if (lastDate) {
            const dateLast = new Date(lastDate);
            const dateHoy = new Date(hoy);
            const diffDays = Math.floor((dateHoy - dateLast) / (1000 * 60 * 60 * 24));

            if (diffDays > 1 && lastDate !== hoy) {
                streak = 0;
                localStorage.setItem('userStreak', 0);
            }
        }
        document.getElementById('streak-num').innerText = streak;
    }

    function updateStreak() {
        const lastDate = localStorage.getItem('lastDatePlayed');
        let streak = parseInt(localStorage.getItem('userStreak') || 0);
        if (lastDate === hoy) return;

        const ayer = new Date(); ayer.setDate(ayer.getDate() - 1);
        const ayerStr = ayer.toISOString().split("T")[0];

        if (lastDate === ayerStr) streak++;
        else streak = 1;

        localStorage.setItem('userStreak', streak);
        localStorage.setItem('lastDatePlayed', hoy);
        document.getElementById('streak-num').innerText = streak;
    }

    function initGame(mode) {
        playingDate = (mode === 'today') ? hoy : document.getElementById('calendar-input').value;
        if (!playingDate) return;
        const seed = playingDate.split("-").join("");
        currentQuestions = getDailySet(seed);
        currentStep = 0; score = 0;
        showScreen('screen-game');
        startTimer();
        loadQuestion();
    }

    function getDailySet(seed) {
        let s = parseInt(seed);
        let temp = [...masterBank];
        for (let i = temp.length - 1; i > 0; i--) {
            s = (s * 9301 + 49297) % 233280;
            let j = s % (i + 1);
            [temp[i], temp[j]] = [temp[j], temp[i]];
        }
        return temp.slice(0, 10);
    }

    function loadQuestion() {
        const q = currentQuestions[currentStep];
        document.getElementById('q-count').innerText = `${currentStep + 1}/10`;
        document.getElementById('q-text').innerText = q.q;
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        q.o.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = opt;
            b.onclick = () => {
                if(document.querySelector('.correct')) return;
                if(i === q.a) { b.classList.add('correct'); score++; }
                else { b.classList.add('wrong'); document.querySelectorAll('.opt-btn')[q.a].classList.add('correct'); }
                setTimeout(() => {
                    currentStep++;
                    if(currentStep < 10) loadQuestion();
                    else finishGame();
                }, 800);
            };
            box.appendChild(b);
        });
    }

    function finishGame() {
        clearInterval(timerInterval);
        showScreen('screen-result');
        document.getElementById('final-stats').innerText = `${score}/10`;
        document.getElementById('final-time').innerText = "Tiempo: " + document.getElementById('timer').innerText;
        if(playingDate === hoy) {
            const name = localStorage.getItem('triviaUser');
            database.ref('ranking/' + name + "_" + hoy).set({
                user: name, points: score, time: document.getElementById('timer').innerText, date: hoy
            });
            localStorage.setItem('lastPlayed_' + hoy, 'true');
            updateStreak();
        }
    }

    function renderLeaderboard() {
        database.ref('ranking').orderByChild('date').equalTo(hoy).on('value', (snap) => {
            let data = []; snap.forEach(c => data.push(c.val()));
            data.sort((a,b) => b.points - a.points || a.time.localeCompare(b.time));
            let html = "";
            for (let i = 0; i < 10; i++) {
                if(data[i]) html += `<div class="entry"><span class="rank">#${i+1}</span><span class="username">${data[i].user}</span><span class="score-tag">${data[i].points}/10</span></div>`;
                else html += `<div class="entry" style="opacity:0.2"><span class="rank">#${i+1}</span><span class="username">---</span></div>`;
            }
            document.getElementById('lead-list').innerHTML = html;
        });
    }

    function startTimer() {
        let start = Date.now();
        timerInterval = setInterval(() => {
            let diff = Date.now() - start;
            let m = Math.floor(diff / 60000);
            let s = Math.floor((diff % 60000) / 1000);
            document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    checkAuth();
</script>
</body>
</html>
