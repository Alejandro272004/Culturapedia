<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIVIAL BRUTAL - SISTEMA 250</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #08080a; --card: #12121a; --accent: #00f2ff; --success: #00ff88; --error: #ff3e3e; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .main-layout { display: flex; flex-direction: row; gap: 30px; width: 100%; max-width: 1100px; align-items: flex-start; }
        .sidebar-ranking { width: 350px; flex-shrink: 0; position: sticky; top: 20px; }
        .leaderboard { background: #0d0d12; border-radius: 20px; padding: 20px; border: 1px solid #222; }
        .leaderboard h3 { color: var(--accent); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .entry { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center; font-size: 0.85rem; }
        .rank { font-weight: 900; width: 25px; color: #444; }
        .username { flex-grow: 1; font-weight: 600; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .score-tag { font-family: monospace; color: var(--accent); font-weight: bold; margin-left: 10px; }
        .time-tag { font-family: monospace; color: #555; font-size: 0.7rem; margin-left: 8px; }
        .game-column { flex-grow: 1; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: var(--card); border-radius: 25px; padding: 35px; border: 1px solid #222; text-align: center; }
        .screen { display: none; }
        .screen.active { display: block; }
        .btn-main { width: 100%; padding: 18px; background: var(--accent); color: #000; font-weight: 900; border: none; border-radius: 12px; cursor: pointer; text-transform: uppercase; margin-top: 15px; }
        .btn-main:disabled { background: #1a1a1a !important; color: #444 !important; border: 1px solid #222; cursor: default; }
        input { width: 100%; padding: 15px; background: #1a1a24; border: 1px solid #333; color: #fff; border-radius: 10px; margin-top: 10px; text-align: center; box-sizing: border-box; }
        .opt-btn { width: 100%; padding: 15px; margin-bottom: 10px; background: #1c1c26; color: #fff; text-align: left; border-radius: 10px; border: 1px solid #333; cursor: pointer; }
        .correct { background: var(--success) !important; color: #000; font-weight: bold; }
        .wrong { background: var(--error) !important; }
        .streak-fire { color: #ff8800; font-weight: 900; font-size: 1.2rem; margin-bottom: 10px; }
        @media (max-width: 850px) { .main-layout { flex-direction: column; align-items: center; } .sidebar-ranking { width: 100%; order: 2; } }
    </style>
</head>
<body>

<div class="main-layout">
    <aside class="sidebar-ranking">
        <div class="leaderboard">
            <h3>RANKING HOY</h3>
            <div id="lead-list">Sincronizando...</div>
        </div>
    </aside>

    <main class="game-column">
        <div class="container">
            <div id="screen-auth" class="screen">
                <h2>Tu Apodo</h2>
                <input type="text" id="username-input" placeholder="Ej: Mateo">
                <button class="btn-main" id="btn-save-name">ENTRAR AL RETO</button>
            </div>

            <div id="screen-home" class="screen">
                <div class="streak-fire">🔥 RACHA: <span id="streak-num">0</span> DÍAS</div>
                <h1 id="welcome-msg"></h1>
                <button id="play-today-btn" class="btn-main">JUGAR RETO DE HOY</button>
            </div>

            <div id="screen-game" class="screen">
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                    <span id="q-count">1/10</span>
                    <span id="timer" style="color: var(--accent);">00:00</span>
                </div>
                <h3 id="q-text"></h3>
                <div id="options-box"></div>
            </div>

            <div id="screen-result" class="screen">
                <h2>¡RETO FINALIZADO!</h2>
                <div id="final-stats" style="font-size: 3.5rem; font-weight: 900; color: var(--accent);">0/10</div>
                <p id="final-time"></p>
                <div id="save-msg" style="margin-bottom: 15px; font-weight: bold;"></div>
                <button class="btn-main" onclick="location.reload()">VOLVER AL INICIO</button>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, query, orderByChild, equalTo, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDPcUJWbE9zUzNdgm3nqax7FFvadLixTIE",
        authDomain: "trivialbrutal.firebaseapp.com",
        databaseURL: "https://trivialbrutal-default-rtdb.firebaseio.com",
        projectId: "trivialbrutal",
        storageBucket: "trivialbrutal.firebasestorage.app",
        messagingSenderId: "428554501222",
        appId: "1:428554501222:web:0985d7e8784cd46657c1a7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const hoy = new Date().toISOString().split("T")[0];
    
    let timerInterval, currentQuestions = [], currentStep = 0, score = 0;

    // --- BANCO DE PREGUNTAS (RELLENA HASTA 250 AQUÍ) ---
    const masterBank = [
        { q: "¿Qué gas constituye el 78% del aire?", o: ["Oxígeno", "Nitrógeno", "Argón", "CO2"], a: "Nitrógeno" },
        { q: "¿En qué año se hundió el Titanic?", o: ["1912", "1905", "1915", "1920"], a: "1912" },
        { q: "¿Pintor de la Capilla Sixtina?", o: ["Leonardo", "Miguel Ángel", "Rafael", "Donatello"], a: "Miguel Ángel" },
        { q: "¿Capital de Australia?", o: ["Sídney", "Canberra", "Melbourne", "Perth"], a: "Canberra" },
        { q: "¿Río más largo del mundo?", o: ["Nilo", "Amazonas", "Yangtsé", "Misisipi"], a: "Amazonas" },
        { q: "¿Hueso más largo del cuerpo?", o: ["Fémur", "Húmero", "Tibia", "Peroné"], a: "Fémur" },
        { q: "¿Planeta con más lunas?", o: ["Saturno", "Júpiter", "Marte", "Urano"], a: "Saturno" },
        { q: "¿Símbolo químico del Oro?", o: ["Ag", "Au", "Or", "Fe"], a: "Au" },
        { q: "¿Quién escribió Hamlet?", o: ["Shakespeare", "Cervantes", "Moliere", "Dante"], a: "Shakespeare" },
        { q: "¿Animal terrestre más rápido?", o: ["León", "Guepardo", "Tigre", "Avestruz"], a: "Guepardo" },
        { q: "¿Capital de Japón?", o: ["Tokio", "Kioto", "Osaka", "Seúl"], a: "Tokio" }
        // ... añade todas las que quieras
    ];

    const showScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    function syncRanking() {
        const rRef = query(ref(db, 'ranking'), orderByChild('date'), equalTo(hoy));
        onValue(rRef, (snap) => {
            let list = [];
            snap.forEach(c => { list.push(c.val()); });
            list.sort((a,b) => (b.points - a.points) || a.time.localeCompare(b.time));
            
            let html = "";
            for(let i=0; i<10; i++){
                if(list[i]) {
                    html += `<div class="entry"><span class="rank">#${i+1}</span><span class="username">${list[i].user}</span><span class="score-tag">${list[i].points}/10</span><span class="time-tag">${list[i].time}</span></div>`;
                } else {
                    html += `<div class="entry" style="opacity:0.2"><span class="rank">#${i+1}</span><span class="username">---</span></div>`;
                }
            }
            document.getElementById('lead-list').innerHTML = html;
        });
    }

    function checkAuth() {
        let name = localStorage.getItem('triviaUser');
        if (!name) showScreen('screen-auth');
        else {
            showScreen('screen-home');
            document.getElementById('welcome-msg').innerText = `Hola, ${name}`;
            document.getElementById('streak-num').innerText = localStorage.getItem('userStreak') || 0;
            if(localStorage.getItem('lastPlayed_' + hoy)) {
                const btn = document.getElementById('play-today-btn');
                btn.disabled = true; btn.innerText = "RETO COMPLETADO ✅";
            }
            syncRanking();
        }
    }

    const initGame = () => {
        // --- SELECCIÓN ALEATORIA DIARIA ---
        // Mezclamos el banco completo y pillamos 10
        currentQuestions = [...masterBank].sort(() => Math.random() - 0.5).slice(0,10);
        currentStep = 0; score = 0;
        showScreen('screen-game');
        startTimer();
        loadQuestion();
    };

    function loadQuestion() {
        const qData = currentQuestions[currentStep];
        document.getElementById('q-count').innerText = `${currentStep+1}/10`;
        document.getElementById('q-text').innerText = qData.q;
        let options = [...qData.o].sort(() => Math.random() - 0.5);
        const box = document.getElementById('options-box');
        box.innerHTML = "";
        options.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'opt-btn'; b.innerText = opt;
            b.onclick = () => {
                if(document.querySelector('.correct')) return;
                if(opt === qData.a) { b.classList.add('correct'); score++; }
                else { b.classList.add('wrong'); }
                setTimeout(() => {
                    currentStep++;
                    if(currentStep < 10) loadQuestion(); else finish();
                }, 800);
            };
            box.appendChild(b);
        });
    }

    function startTimer() {
        let start = Date.now();
        timerInterval = setInterval(() => {
            let diff = Date.now() - start;
            let m = Math.floor(diff/60000).toString().padStart(2,'0');
            let s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }, 1000);
    }

    function finish() {
        clearInterval(timerInterval);
        const t = document.getElementById('timer').innerText;
        showScreen('screen-result');
        document.getElementById('final-stats').innerText = `${score}/10`;
        
        const name = localStorage.getItem('triviaUser');
        // ID única: fecha + nombre (limpio de espacios) para evitar repetidos
        const userKey = name.toLowerCase().replace(/\s+/g, '_');
        const entryRef = ref(db, `ranking/${hoy}_${userKey}`);

        set(entryRef, {
            user: name, points: score, time: t, date: hoy, ts: serverTimestamp()
        }).then(() => {
            localStorage.setItem('lastPlayed_' + hoy, 'true');
            let streak = parseInt(localStorage.getItem('userStreak') || 0);
            if (localStorage.getItem('lastDatePlayed') !== hoy) {
                streak++;
                localStorage.setItem('userStreak', streak);
                localStorage.setItem('lastDatePlayed', hoy);
            }
        });
    }

    document.getElementById('btn-save-name').onclick = () => {
        const val = document.getElementById('username-input').value.trim();
        if(val.length >= 2) { localStorage.setItem('triviaUser', val); checkAuth(); }
    };
    document.getElementById('play-today-btn').onclick = () => initGame();
    checkAuth();
</script>
</body>
</html>
