<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIVIAL BRUTAL - RANKING DIARIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #08080a; --card: #12121a; --accent: #00f2ff; --success: #00ff88; --error: #ff3e3e; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .main-layout { display: flex; flex-direction: row; gap: 30px; width: 100%; max-width: 1100px; align-items: flex-start; }
        .sidebar-ranking { width: 350px; flex-shrink: 0; position: sticky; top: 20px; }
        .leaderboard { background: #0d0d12; border-radius: 20px; padding: 20px; border: 1px solid #222; }
        .leaderboard h3 { color: var(--accent); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .entry { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center; font-size: 0.85rem; }
        .rank { font-weight: 900; width: 25px; color: #444; }
        .username { flex-grow: 1; font-weight: 600; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .score-tag { font-family: monospace; color: var(--accent); font-weight: bold; margin-left: 10px; }
        .time-tag { font-family: monospace; color: #555; font-size: 0.7rem; margin-left: 8px; }
        .game-column { flex-grow: 1; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: var(--card); border-radius: 25px; padding: 35px; border: 1px solid #222; text-align: center; }
        .screen { display: none; }
        .screen.active { display: block; }
        .btn-main { width: 100%; padding: 18px; background: var(--accent); color: #000; font-weight: 900; border: none; border-radius: 12px; cursor: pointer; text-transform: uppercase; margin-top: 15px; }
        .btn-main:disabled { background: #1a1a1a !important; color: #444 !important; border: 1px solid #222; cursor: default; }
        input { width: 100%; padding: 15px; background: #1a1a24; border: 1px solid #333; color: #fff; border-radius: 10px; margin-top: 10px; text-align: center; box-sizing: border-box; }
        .opt-btn { width: 100%; padding: 15px; margin-bottom: 10px; background: #1c1c26; color: #fff; text-align: left; border-radius: 10px; border: 1px solid #333; cursor: pointer; }
        .correct { background: var(--success) !important; color: #000; font-weight: bold; }
        .wrong { background: var(--error) !important; }
        .streak-fire { color: #ff8800; font-weight: 900; font-size: 1.2rem; margin-bottom: 10px; }
        @media (max-width: 850px) { .main-layout { flex-direction: column; align-items: center; } .sidebar-ranking { width: 100%; order: 2; } }
    </style>
</head>
<body>

<div class="main-layout">
    <aside class="sidebar-ranking">
        <div class="leaderboard">
            <h3 id="ranking-title">RANKING HOY</h3>
            <div id="lead-list">Buscando retadores...</div>
        </div>
    </aside>

    <main class="game-column">
        <div class="container">
            <div id="screen-auth" class="screen">
                <h2>Tu Apodo</h2>
                <input type="text" id="username-input" placeholder="Ej: Maria Jimenez">
                <button class="btn-main" id="btn-save-name">ENTRAR AL RETO</button>
            </div>

            <div id="screen-home" class="screen">
                <div class="streak-fire">🔥 RACHA: <span id="streak-num">0</span> DÍAS</div>
                <h1 id="welcome-msg"></h1>
                <button id="play-today-btn" class="btn-main">JUGAR RETO DE HOY</button>
                <div style="margin-top: 25px; opacity: 0.5;">
                    <small>Días anteriores:</small><br>
                    <input type="date" id="calendar-input">
                </div>
            </div>

            <div id="screen-game" class="screen">
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                    <span id="q-count">1/10</span>
                    <span id="timer" style="color: var(--accent);">00:00</span>
                </div>
                <h3 id="q-text"></h3>
                <div id="options-box"></div>
            </div>

            <div id="screen-result" class="screen">
                <h2>¡RETO FINALIZADO!</h2>
                <div id="final-stats" style="font-size: 3.5rem; font-weight: 900; color: var(--accent);">0/10</div>
                <p id="final-time"></p>
                <div id="save-msg" style="font-size: 0.9rem; font-weight: bold; margin-bottom: 10px;"></div>
                <button class="btn-main" onclick="location.reload()">VOLVER AL INICIO</button>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, query, orderByChild, equalTo, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDPcUJWbE9zUzNdgm3nqax7FFvadLixTIE",
        authDomain: "trivialbrutal.firebaseapp.com",
        databaseURL: "https://trivialbrutal-default-rtdb.firebaseio.com",
        projectId: "trivialbrutal",
        storageBucket: "trivialbrutal.firebasestorage.app",
        messagingSenderId: "428554501222",
        appId: "1:428554501222:web:0985d7e8784cd46657c1a7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    // Función para obtener la fecha actual en formato local YYYY-MM-DD
    const getTodayStr = () => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };

    const hoy = getTodayStr();
    
    let timerInterval, currentQuestions = [], currentStep = 0, score = 0, playingDate = "";

    const masterBank = [
        { q: "¿Qué gas constituye el 78% del aire?", o: ["Oxígeno", "Nitrógeno", "Argón", "CO2"], a: 1 },
        { q: "¿En qué año se hundió el Titanic?", o: ["1912", "1905", "1915", "1920"], a: 0 },
        { q: "¿Pintor de la Capilla Sixtina?", o: ["Leonardo", "Miguel Ángel", "Rafael", "Donatello"], a: 1 },
        { q: "¿Capital de Australia?", o: ["Sídney", "Canberra", "Melbourne", "Perth"], a: 1 },
        { q: "¿Río más largo del mundo?", o: ["Nilo", "Amazonas", "Yangtsé", "Misisipi"], a: 1 },
        { q: "¿Hueso más largo del cuerpo?", o: ["Fémur", "Húmero", "Tibia", "Peroné"], a: 0 },
        { q: "¿País con más lunas?", o: ["Saturno", "Júpiter", "Marte", "Urano"], a: 0 },
        { q: "¿Cuántos corazones tiene un pulpo?", o: ["1", "2", "3", "4"], a: 2 },
        { q: "¿Símbolo químico del Oro?", o: ["Ag", "Au", "Or", "Fe"], a: 1 },
        { q: "¿Quién escribió Hamlet?", o: ["Shakespeare", "Cervantes", "Moliere", "Dante"], a: 0 }
    ];

    const showScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    function renderRanking(dateToFetch) {
        const targetDate = dateToFetch || hoy;
        document.getElementById('ranking-title').innerText = targetDate === hoy ? "RANKING HOY" : `RANKING ${targetDate}`;

        // ESTA ES LA CLAVE: Solo pide los datos donde 'date' sea IGUAL a la fecha elegida
        const rRef = query(ref(db, 'ranking'), orderByChild('date'), equalTo(targetDate));
        
        onValue(rRef, (snap) => {
            let list = [];
            snap.forEach(c => { list.push(c.val()); });
            
            list.sort((a,b) => b.points - a.points || a.time.localeCompare(b.time));
            
            let html = "";
            for(let i=0; i<10; i++){
                if(list[i]) {
                    html += `<div class="entry"><span class="rank">#${i+1}</span><span class="username">${list[i].user}</span><span class="score-tag">${list[i].points}/10</span><span class="time-tag">${list[i].time}</span></div>`;
                } else {
                    html += `<div class="entry" style="opacity:0.2"><span class="rank">#${i+1}</span><span class="username">---</span></div>`;
                }
            }
            document.getElementById('lead-list').innerHTML = html;
        });
    }

    function checkAuth() {
        let name = localStorage.getItem('triviaUser');
        if (!name) showScreen('screen-auth');
        else {
            showScreen('screen-home');
            document.getElementById('welcome-msg').innerText = `Hola, ${name}`;
            document.getElementById('calendar-input').max = hoy;
            if(localStorage.getItem('lastPlayed_' + hoy)) {
                const btn = document.getElementById('play-today-btn');
                btn.disabled = true; btn.innerText = "RETADO COMPLETADO ✅";
            }
            checkStreak();
            renderRanking(hoy); // Al iniciar, muestra el de HOY
        }
    }

    function checkStreak() {
        const last = localStorage.getItem('lastDatePlayed');
        let streak = parseInt(localStorage.getItem('userStreak') || 0);
        if (last && last !== hoy) {
            const diff = Math.floor((new Date(hoy) - new Date(last)) / 86400000);
            if (diff >= 2) { streak = 0; localStorage.setItem('userStreak', 0); }
        }
        document.getElementById('streak-num').innerText = streak;
    }

    const initGame = (mode) => {
        playingDate = (mode === 'today') ? hoy : document.getElementById('calendar-input').value;
        if(!playingDate) return;
        currentQuestions = getSet(playingDate.replace(/-/g, ""));
        currentStep = 0; score = 0;
        showScreen('screen-game');
        startTimer();
        loadQuestion();
    };

    function getSet(seed) {
        let s = parseInt(seed);
        let t = [...masterBank];
        for (let i = t.length - 1; i > 0; i--) {
            s = (s * 9301 + 49297) % 233280;
            let j = s % (i + 1);
            [t[i], t[j]] = [t[j], t[i]];
        }
        return t.slice(0,10);
    }

    function loadQuestion() {
        const q = currentQuestions[currentStep];
        document.getElementById('q-count').innerText = `${currentStep+1}/10`;
        document.getElementById('q-text').innerText = q.q;
        const box = document.getElementById('options-box');
        box.innerHTML = "";
        q.o.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'opt-btn'; b.innerText = opt;
            b.onclick = () => {
                if(document.querySelector('.correct')) return;
                if(i === q.a) { b.classList.add('correct'); score++; }
                else { b.classList.add('wrong'); box.children[q.a].classList.add('correct'); }
                setTimeout(() => {
                    currentStep++;
                    if(currentStep < 10) loadQuestion(); else finish();
                }, 800);
            };
            box.appendChild(b);
        });
    }

    function startTimer() {
        let start = Date.now();
        timerInterval = setInterval(() => {
            let diff = Date.now() - start;
            let m = Math.floor(diff/60000).toString().padStart(2,'0');
            let s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }, 1000);
    }

    function finish() {
        clearInterval(timerInterval);
        const t = document.getElementById('timer').innerText;
        showScreen('screen-result');
        document.getElementById('final-stats').innerText = `${score}/10`;
        document.getElementById('final-time').innerText = `Tu tiempo: ${t}`;
        
        if(playingDate === hoy) {
            const name = localStorage.getItem('triviaUser');
            const statusMsg = document.getElementById('save-msg');
            statusMsg.style.color = "var(--accent)";
            statusMsg.innerText = "Actualizando ranking diario...";
            
            const newEntryRef = push(ref(db, 'ranking'));
            set(newEntryRef, {
                user: name,
                points: score,
                time: t,
                date: hoy, // Importante: Se guarda con la fecha de HOY
                timestamp: serverTimestamp()
            }).then(() => {
                statusMsg.style.color = "var(--success)";
                statusMsg.innerText = "✅ ¡Estás en el ranking de hoy!";
                localStorage.setItem('lastPlayed_' + hoy, 'true');
                updateStreak();
                renderRanking(hoy); 
            });
        }
    }

    function updateStreak() {
        let streak = parseInt(localStorage.getItem('userStreak') || 0);
        const last = localStorage.getItem('lastDatePlayed');
        const d = new Date(); d.setDate(d.getDate()-1);
        const ayerStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        if(last === ayerStr) streak++; else streak = 1;
        localStorage.setItem('userStreak', streak);
        localStorage.setItem('lastDatePlayed', hoy);
        document.getElementById('streak-num').innerText = streak;
    }

    document.getElementById('btn-save-name').onclick = () => {
        const val = document.getElementById('username-input').value.trim();
        if(val.length >= 2) { localStorage.setItem('triviaUser', val); checkAuth(); }
    };
    document.getElementById('play-today-btn').onclick = () => initGame('today');
    document.getElementById('calendar-input').onchange = (e) => renderRanking(e.target.value);

    checkAuth();
</script>
</body>
</html>
