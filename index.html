<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIVIAL BRUTAL DIARIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #08080a;
            --card: #12121a;
            --accent: #00f2ff;
            --success: #00ff88;
            --error: #ff3e3e;
            --gold: #ffcc00;
            --text: #ffffff;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-layout {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 40px;
            width: 100%;
            max-width: 1100px;
        }

        .sidebar-ranking {
            width: 350px;
            flex-shrink: 0;
        }

        .leaderboard { 
            background: #0d0d12; 
            border-radius: 20px; 
            padding: 25px; 
            border: 1px solid #222;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .leaderboard h3 { 
            color: var(--accent); 
            text-transform: uppercase; 
            font-size: 0.85rem; 
            margin: 0 0 20px 0; 
            letter-spacing: 2px;
            font-weight: 900;
        }
        
        .entry { 
            display: flex; 
            justify-content: space-between; 
            padding: 12px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            align-items: center;
        }
        .entry:last-child { border: none; }

        .rank { font-weight: 900; width: 35px; color: #555
        .entry:nth-child(2) .rank { color: var(--gold); }
        .entry:nth-child(3) .rank { color: #c0c0c0; }
        .entry:nth-child(4) .rank { color: #cd7f32; }

        .username { flex-grow: 1; text-align: left; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .score-tag { font-family: monospace; font-size: 0.85rem; background: #1a1a24; padding: 4px 8px; border-radius: 6px; }

        .game-column {
            flex-grow: 1;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-main {
            width: 100%; padding: 20px; background: var(--accent); color: black;
            font-weight: 900; border: none; border-radius: 14px; margin-top: 20px;
            cursor: pointer; text-transform: uppercase; transition: 0.2s;
        }
        .btn-main:hover { transform: scale(1.02); filter: brightness(1.1); }
        .btn-main:disabled { background: #222 !important; color: #555 !important; cursor: not-allowed; }

        input {
            width: 100%; padding: 16px; background: #1e1e2a; border: 1px solid #333;
            color: white; border-radius: 12px; margin-top: 10px; box-sizing: border-box; text-align: center; font-size: 1rem;
        }

        .opt-btn {
            width: 100%; padding: 18px; margin-bottom: 12px; background: #1c1c26;
            color: white; text-align: left; border-radius: 12px; border: 2px solid transparent; cursor: pointer; transition: 0.2s;
        }
        .correct { background: var(--success) !important; color: black; font-weight: 900; }
        .wrong { background: var(--error) !important; }

        .streak-fire { color: #ff8800; font-weight: 900; font-size: 1.3rem; margin-bottom: 15px; }
        #timer { font-family: monospace; color: var(--accent); font-size: 1.2rem; }

        @media (max-width: 900px) {
            .main-layout { flex-direction: column; align-items: center; }
            .sidebar-ranking { width: 100%; max-width: 450px; order: 2; }
        }
    </style>
</head>
<body>

<div class="main-layout">
    <aside class="sidebar-ranking">
        <div class="leaderboard">
            <h3>TOP 10 MUNDIAL (HOY)</h3>
            <div id="lead-list">Cargando clasificación...</div>
        </div>
    </aside>

    <main class="game-column">
        <div class="container">
            <div id="screen-auth" class="screen">
                <h1>Tu Apodo</h1>
                <input type="text" id="username-input" placeholder="Ej: Neo99">
                <button class="btn-main" id="btn-save-name">ENTRAR AL RETO</button>
            </div>

            <div id="screen-home" class="screen">
                <div class="streak-fire">🔥 RACHA: <span id="streak-num">0</span> DÍAS</div>
                <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Trivial Brutal</h1>
                <p id="welcome-msg" style="opacity: 0.6; margin-bottom: 30px;"></p>
                <button id="play-today-btn" class="btn-main">JUGAR RETO DE HOY</button>
                <div style="margin-top: 30px; border-top: 1px solid #222; padding-top: 20px;">
                    <label style="font-size: 0.7rem; opacity: 0.4; display: block; margin-bottom: 10px;">DÍAS ANTERIORES:</label>
                    <input type="date" id="calendar-input">
                </div>
            </div>

            <div id="screen-game" class="screen">
                <div style="display: flex; justify-content: space-between; margin-bottom: 25px;">
                    <span id="q-count" style="font-weight: 900; opacity: 0.5;">1/10</span>
                    <span id="timer">00:00</span>
                </div>
                <h2 id="q-text" style="min-height: 80px; font-size: 1.4rem; line-height: 1.3;">Cargando...</h2>
                <div id="options-box" style="margin-top: 20px;"></div>
            </div>

            <div id="screen-result" class="screen">
                <h2 style="opacity: 0.5;">FIN DEL RETO</h2>
                <div id="final-stats" style="font-size: 4.5rem; color: var(--accent); font-weight: 900;">0/10</div>
                <p id="final-time" style="font-family: monospace; font-size: 1.2rem;"></p>
                <button class="btn-main" id="btn-reload">VOLVER AL INICIO</button>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDPcUJWbE9zUzNdgm3nqax7FFvadLixTIE",
        authDomain: "trivialbrutal.firebaseapp.com",
        databaseURL: "https://trivialbrutal-default-rtdb.firebaseio.com",
        projectId: "trivialbrutal",
        storageBucket: "trivialbrutal.firebasestorage.app",
        messagingSenderId: "428554501222",
        appId: "1:428554501222:web:0985d7e8784cd46657c1a7",
        measurementId: "G-JV1QM4GVL4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const masterBank = [
        { q: "¿Qué gas constituye el 78% de la atmósfera?", o: ["Oxígeno", "Nitrógeno", "Argón", "CO2"], a: 1 },
        { q: "¿En qué año se hundió el Titanic?", o: ["1912", "1905", "1915", "1920"], a: 0 },
        { q: "¿Lugar más profundo de la Tierra?", o: ["Fosa de las Marianas", "Abismo de Java", "Fosa de Puerto Rico", "Tonga"], a: 0 },
        { q: "¿Quién escribió 'Cien años de soledad'?", o: ["Vargas Llosa", "García Márquez", "Cortázar", "Borges"], a: 1 },
        { q: "¿Qué planeta tiene más lunas?", o: ["Júpiter", "Saturno", "Marte", "Urano"], a: 1 },
        { q: "¿Hueso más largo del cuerpo?", o: ["Húmero", "Fémur", "Tibia", "Peroné"], a: 1 },
        { q: "¿Quién pintó la Capilla Sixtina?", o: ["Leonardo", "Miguel Ángel", "Rafael", "Donatello"], a: 1 },
        { q: "¿Capital de Australia?", o: ["Sídney", "Canberra", "Melbourne", "Perth"], a: 1 },
        { q: "¿Río más largo del mundo?", o: ["Nilo", "Amazonas", "Yangtsé", "Misisipi"], a: 1 },
        { q: "¿Símbolo químico del Hierro?", o: ["Ir", "H", "Fe", "Hi"], a: 2 },
        { q: "¿Partícula negativa del átomo?", o: ["Protón", "Neutrón", "Electrón", "Quark"], a: 2 },
        { q: "¿Mamífero más grande?", o: ["Elefante", "Ballena Azul", "Jirafa", "Orca"], a: 1 },
        { q: "¿Planeta más cercano al Sol?", o: ["Venus", "Marte", "Mercurio", "Tierra"], a: 2 },
        { q: "¿Quién inventó la bombilla?", o: ["Tesla", "Edison", "Bell", "Newton"], a: 1 },
        { q: "¿Cuándo empezó la 1ª Guerra Mundial?", o: ["1912", "1914", "1918", "1939"], a: 1 },
        { q: "¿País más grande del mundo?", o: ["China", "EE.UU.", "Rusia", "Canadá"], a: 2 },
        { q: "¿En qué año cayó el Muro de Berlín?", o: ["1987", "1989", "1991", "1995"], a: 1 },
        { q: "¿Quién escribió 'Hamlet'?", o: ["Cervantes", "Shakespeare", "Dante", "Goethe"], a: 1 },
        { q: "¿En qué ciudad está el Louvre?", o: ["Roma", "Londres", "París", "Madrid"], a: 2 },
        { q: "¿Banda apodada 'The Fab Four'?", o: ["The Who", "The Beatles", "Stones", "Queen"], a: 1 },
        { q: "¿País ganador del Mundial 2022?", o: ["Francia", "Brasil", "Argentina", "Croacia"], a: 2 },
        { q: "¿Lados de un hexágono?", o: ["5", "6", "7", "8"], a: 1 },
        { q: "¿Capital de Portugal?", o: ["Oporto", "Lisboa", "Coímbra", "Faro"], a: 1 },
        { q: "¿Qué animal es la esfinge?", o: ["León", "Gato", "Perro", "Halcón"], a: 0 },
        { q: "¿Gas que necesitan las plantas?", o: ["Oxígeno", "CO2", "Hidrógeno", "Argón"], a: 1 },
        { q: "¿Quién pintó el Guernica?", o: ["Dalí", "Miró", "Picasso", "Velázquez"], a: 2 },
        { q: "¿Océano más grande?", o: ["Atlántico", "Índico", "Pacífico", "Ártico"], a: 2 },
        { q: "¿Metal que es líquido a temp. ambiente?", o: ["Plomo", "Mercurio", "Plata", "Cobre"], a: 1 },
        { q: "¿Deporte con un 'puck'?", o: ["Lacrosse", "Hockey Hielo", "Polo", "Rugby"], a: 1 },
        { q: "¿Cuántos huesos tiene un adulto?", o: ["206", "300", "150", "210"], a: 0 },
        { q: "¿Capital de Italia?", o: ["Milán", "Nápoles", "Roma", "Florencia"], a: 2 },
        { q: "¿Quién descubrió la penicilina?", o: ["Fleming", "Pasteur", "Curie", "Darwin"], a: 0 },
        { q: "¿A qué país pertenece Groenlandia?", o: ["Noruega", "Dinamarca", "Canadá", "Islandia"], a: 1 },
        { q: "¿Instrumento de 88 teclas?", o: ["Arpa", "Piano", "Guitarra", "Órgano"], a: 1 },
        { q: "¿De qué está hecho el diamante?", o: ["Silicio", "Carbono", "Hierro", "Calcio"], a: 1 },
        { q: "¿Quién escribió 'La Odisea'?", o: ["Platón", "Homero", "Aristóteles", "Sófocles"], a: 1 },
        { q: "¿Planeta rojo?", o: ["Júpiter", "Marte", "Saturno", "Venus"], a: 1 },
        { q: "¿Órgano que bombea sangre?", o: ["Pulmón", "Cerebro", "Corazón", "Hígado"], a: 2 },
        { q: "¿País del sol naciente?", o: ["China", "Corea", "Japón", "Tailandia"], a: 2 },
        { q: "¿Pintor de 'La persistencia de la memoria'?", o: ["Picasso", "Dalí", "Miró", "Magritte"], a: 1 },
        { q: "¿Cuántos corazones tiene un pulpo?", o: ["1", "2", "3", "4"], a: 2 },
        { q: "¿Moneda de Japón?", o: ["Yuan", "Won", "Yen", "Dólar"], a: 2 },
        { q: "¿Quién propuso la relatividad?", o: ["Newton", "Einstein", "Hawking", "Bohr"], a: 1 },
        { q: "¿Animal más rápido?", o: ["Guepardo", "Halcón Peregrino", "Vela", "Tiburón"], a: 1 },
        { q: "¿Capital de Francia?", o: ["Lyon", "Marsella", "París", "Niza"], a: 2 },
        { q: "¿Cuántos colores tiene el arcoíris?", o: ["6", "7", "8", "5"], a: 1 },
        { q: "¿En qué continente está Egipto?", o: ["Asia", "África", "Europa", "Oceanía"], a: 1 },
        { q: "¿Quién pintó 'La última cena'?", o: ["Leonardo", "Miguel Ángel", "Rafael", "Donatello"], a: 0 },
        { q: "¿Cuál es el tercer planeta?", o: ["Venus", "Tierra", "Marte", "Mercurio"], a: 1 },
        { q: "¿Idioma más hablado (nativo)?", o: ["Inglés", "Chino Mandarín", "Español", "Hindi"], a: 1 },
        { q: "¿En qué país nació la pizza?", o: ["Grecia", "Italia", "Francia", "México"], a: 1 },
        { q: "¿Qué estudia la botánica?", o: ["Animales", "Plantas", "Rocas", "Estrellas"], a: 1 },
        { q: "¿Cuántos minutos tiene un día?", o: ["1440", "1200", "2400", "1000"], a: 0 },
        { q: "¿Primer hombre en la luna?", o: ["Aldrin", "Armstrong", "Collins", "Gagarin"], a: 1 },
        { q: "¿Símbolo químico del Oro?", o: ["Or", "Ag", "Au", "Gd"], a: 2 },
        { q: "¿Quién escribió 'Sherlock Holmes'?", o: ["Agatha Christie", "Conan Doyle", "Poe", "King"], a: 1 },
        { q: "¿Capital de Alemania?", o: ["Múnich", "Hamburgo", "Berlín", "Frankfurt"], a: 2 },
        { q: "¿Cuál es el metal más caro?", o: ["Oro", "Platino", "Rodio", "Iridio"], a: 2 },
        { q: "¿Cuántas patas tiene una araña?", o: ["6", "8", "10", "12"], a: 1 },
        { q: "¿Qué ciudad tiene canales?", o: ["Ámsterdam", "Venecia", "Brujas", "Todas"], a: 3 }
    ];

    const hoy = new Date().toISOString().split("T")[0];
    let timerInterval, currentQuestions = [], currentStep = 0, score = 0, playingDate = "";

    window.saveName = () => {
        const val = document.getElementById('username-input').value.trim();
        if (val.length >= 3) { localStorage.setItem('triviaUser', val); checkAuth(); }
    };

    window.initGame = (mode) => {
        playingDate = (mode === 'today') ? hoy : document.getElementById('calendar-input').value;
        if (!playingDate) return;
        const seed = playingDate.split("-").join("");
        currentQuestions = getDailySet(seed);
        currentStep = 0; score = 0;
        showScreen('screen-game');
        startTimer();
        loadQuestion();
    };

    function checkAuth() {
        const name = localStorage.getItem('triviaUser');
        if (!name) showScreen('screen-auth');
        else {
            showScreen('screen-home');
            document.getElementById('welcome-msg').innerText = `Listo para el reto, ${name}`;
            document.getElementById('calendar-input').max = hoy;
            
            // CORRECCIÓN RACHA: Si ya jugó hoy, forzamos racha a 1 para evitar el 0 inicial
            if(localStorage.getItem('lastPlayed_' + hoy)) {
                const btn = document.getElementById('play-today-btn');
                btn.disabled = true; 
                btn.innerText = "RETO COMPLETADO ✅";
                
                if ((localStorage.getItem('userStreak') || "0") === "0") {
                    localStorage.setItem('userStreak', '1');
                    localStorage.setItem('lastDatePlayed', hoy);
                }
            }

            checkStreak();
            renderLeaderboard();
        }
    }

    function checkStreak() {
        const lastDate = localStorage.getItem('lastDatePlayed');
        let streak = parseInt(localStorage.getItem('userStreak') || 0);
        if (lastDate) {
            const dateLast = new Date(lastDate);
            const dateHoy = new Date(hoy);
            const diffDays = Math.floor((dateHoy - dateLast) / (1000 * 60 * 60 * 24));
            if (diffDays > 1 && lastDate !== hoy) {
                streak = 0; localStorage.setItem('userStreak', 0);
            }
        }
        document.getElementById('streak-num').innerText = streak;
    }

    function updateStreak() {
        const lastDate = localStorage.getItem('lastDatePlayed');
        let streak = parseInt(localStorage.getItem('userStreak') || 0);
        if (lastDate === hoy) return;
        const ayer = new Date(); ayer.setDate(ayer.getDate() - 1);
        const ayerStr = ayer.toISOString().split("T")[0];
        if (lastDate === ayerStr) streak++; else streak = 1;
        localStorage.setItem('userStreak', streak);
        localStorage.setItem('lastDatePlayed', hoy);
        document.getElementById('streak-num').innerText = streak;
    }

    function renderLeaderboard() {
        const rankingRef = query(ref(db, 'ranking'), orderByChild('date'), equalTo(hoy));
        onValue(rankingRef, (snapshot) => {
            let data = [];
            snapshot.forEach(child => data.push(child.val()));
            data.sort((a,b) => b.points - a.points || a.time.localeCompare(b.time));
            let html = "";
            for (let i = 0; i < 10; i++) {
                if(data[i]) html += `<div class="entry"><span class="rank">#${i+1}</span><span class="username">${data[i].user}</span><span class="score-tag">${data[i].points}/10 <small style="opacity:0.4">${data[i].time}</small></span></div>`;
                else html += `<div class="entry" style="opacity:0.2"><span class="rank">#${i+1}</span><span class="username">Esperando...</span><span class="score-tag">--</span></div>`;
            }
            document.getElementById('lead-list').innerHTML = html;
        });
    }

    function getDailySet(seed) {
        let s = parseInt(seed);
        let temp = [...masterBank];
        for (let i = temp.length - 1; i > 0; i--) {
            s = (s * 9301 + 49297) % 233280;
            let j = s % (i + 1);
            [temp[i], temp[j]] = [temp[j], temp[i]];
        }
        return temp.slice(0, 10);
    }

    function loadQuestion() {
        const q = currentQuestions[currentStep];
        document.getElementById('q-count').innerText = `${currentStep + 1}/10`;
        document.getElementById('q-text').innerText = q.q;
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        q.o.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'opt-btn'; b.innerText = opt;
            b.onclick = () => {
                if(document.querySelector('.correct')) return;
                if(i === q.a) { b.classList.add('correct'); score++; }
                else { b.classList.add('wrong'); document.querySelectorAll('.opt-btn')[q.a].classList.add('correct'); }
                setTimeout(() => {
                    currentStep++;
                    if(currentStep < 10) loadQuestion(); else finishGame();
                }, 800);
            };
            box.appendChild(b);
        });
    }

    function finishGame() {
        clearInterval(timerInterval);
        const timeStr = document.getElementById('timer').innerText;
        showScreen('screen-result');
        document.getElementById('final-stats').innerText = `${score}/10`;
        document.getElementById('final-time').innerText = "TIEMPO: " + timeStr;
        if(playingDate === hoy) {
            const name = localStorage.getItem('triviaUser');
            set(ref(db, 'ranking/' + name + "_" + hoy), {
                user: name, points: score, time: timeStr, date: hoy
            });
            localStorage.setItem('lastPlayed_' + hoy, 'true');
            updateStreak();
        }
    }

    function startTimer() {
        let start = Date.now();
        timerInterval = setInterval(() => {
            let diff = Date.now() - start;
            let m = Math.floor(diff / 60000);
            let s = Math.floor((diff % 60000) / 1000);
            document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    document.getElementById('btn-save-name').onclick = window.saveName;
    document.getElementById('play-today-btn').onclick = () => window.initGame('today');
    document.getElementById('calendar-input').onchange = () => window.initGame('calendar');
    document.getElementById('btn-reload').onclick = () => location.reload();

    checkAuth();
</script>
</body>
</html>
